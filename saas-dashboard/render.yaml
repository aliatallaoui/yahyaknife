services:
  # Backend API
  - type: web
    name: saas-dashboard-api
    env: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Must be set manually in Render Dashboard
      - key: JWT_SECRET
        sync: false # Must be set manually in Render Dashboard

  # Frontend App
  - type: web
    name: saas-dashboard-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://saas-dashboard-api.onrender.com" # Should point to the backend serviceURL
    routes:
      - type: rewrite
        source: /api/*
        destination: "https://saas-dashboard-api.onrender.com/api/*"
      - type: rewrite
        source: /*
        destination: "/index.html"
