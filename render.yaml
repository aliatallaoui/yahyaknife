services:
  # Backend API
  - type: web
    name: yahyaknife
    env: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Must be set manually in Render Dashboard!
      - key: JWT_SECRET
        sync: false # Must be set manually in Render Dashboard!
      - key: CORS_ORIGIN
        value: "https://yahyaknife.vercel.app"
      - key: SENTRY_DSN
        sync: false # Optional — set in Render Dashboard to enable error tracking
      - key: LOG_LEVEL
        value: info

  # Frontend App
  - type: web
    name: saas-dashboard-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://yahyaknife.onrender.com"
      - key: VITE_SENTRY_DSN
        sync: false # Optional — set in Render Dashboard to enable error tracking
    routes:
      - type: rewrite
        source: /api/*
        destination: "https://yahyaknife.onrender.com/api/*"
      - type: rewrite
        source: /*
        destination: "/index.html"
